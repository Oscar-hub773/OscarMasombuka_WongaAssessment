services:
  postgres:
    image: postgres:15
    container_name: wonga-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: WongaAssessmentDb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: WongaAssessment.API/Dockerfile
    container_name: wongaassessment-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:80"